{{- /* Global Partial: Header */}}
<header
    class="header fixed top-0 left-0 z-[20000] w-full bg-white dark:bg-[#101622] border-b border-gray-200 dark:border-white/10 shadow-md transition-colors duration-300">
    <div class="nav w-full max-w-[1280px] mx-auto px-6 h-16 flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center gap-3">
            <a href="{{ "" | absLangURL }}"
                class="flex items-center gap-3 text-white drop-shadow-md decoration-transparent">
                <span class="material-symbols-outlined text-[28px] text-design-primary">all_inclusive</span>
                <h2 class="text-gray-900 dark:text-white text-xl font-bold tracking-tight drop-shadow-sm">THE LOGOS</h2>
            </a>
        </div>

        <!-- Desktop Nav -->
        <nav id="menu" class="hidden md:flex items-center gap-8">
            <a class="text-sm font-medium hover:text-design-primary transition-colors text-gray-700 dark:text-gray-300 drop-shadow-sm"
                href="{{ "" | absLangURL }}">Home</a>
            <a class="text-sm font-medium hover:text-design-primary transition-colors text-gray-700 dark:text-gray-300 drop-shadow-sm"
                href="{{ "posts/" | absLangURL }}">Articles</a>
            <a class="text-sm font-medium hover:text-design-primary transition-colors text-gray-700 dark:text-gray-300 drop-shadow-sm"
                href="{{ "about/" | absLangURL }}">About</a>
        </nav>

        <!-- Right Side Actions -->
        <div class="flex items-center gap-4">
            <!-- Theme Toggle -->
            <button id="theme-toggle"
                class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-700 dark:text-white"
                aria-label="Toggle Theme">
                <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg id="sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="display: none;">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>

            <!-- Network Button - Desktop only -->
            <a id="network-btn" href="{{ "network/" | absLangURL }}"
                class="hidden md:flex bg-transparent hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-white text-sm font-bold h-9 px-4 rounded-lg items-center justify-center transition-all border border-gray-200 dark:border-white/10">
                Network
            </a>

            <!-- Subscribe Button - Desktop only -->
            <button id="subscribe-btn"
                onclick="const el = document.getElementById('subscribe'); if(el) { el.scrollIntoView({behavior:'smooth'}); } else { window.location.href='/#subscribe'; }"
                class="hidden md:flex bg-design-primary hover:bg-design-primary/90 text-white text-sm font-bold h-9 px-5 rounded-lg items-center justify-center transition-all shadow-lg shadow-design-primary/30 active:scale-95 border-none cursor-pointer">
                Subscribe
            </button>

            <!-- Mobile Menu Toggle Button -->
            <button id="mobile-menu-toggle"
                class="p-2 rounded-lg md:hidden hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-gray-700 dark:text-white"
                aria-label="Menu">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
    </div>

    <!-- Mobile Navigation Menu -->
    <div id="mobile-menu"
        class="hidden md:hidden flex-col bg-white dark:bg-design-background-dark border-t border-gray-100 dark:border-white/5 py-4 px-6 gap-4">
        <a class="text-base font-medium text-gray-700 dark:text-gray-300" href="{{ "" | absLangURL }}">Home</a>
        <a class="text-base font-medium text-gray-700 dark:text-gray-300" href="{{ "posts/" | absLangURL }}">Articles</a>
        <a class="text-base font-medium text-gray-700 dark:text-gray-300" href="{{ "about/" | absLangURL }}">About</a>
        <a class="text-base font-medium text-gray-700 dark:text-gray-300" href="{{ "network/" | absLangURL }}">Network</a>
    </div>
</header>

<script>
    function updateThemeIcons() {
        const isDark = document.documentElement.classList.contains('dark') || document.body.classList.contains('dark');
        const moon = document.getElementById('moon');
        const sun = document.getElementById('sun');
        if (moon && sun) {
            moon.style.display = isDark ? 'none' : 'block';
            sun.style.display = isDark ? 'block' : 'none';
        }
    }

    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('dark', isDark);

            if (isDark) {
                localStorage.setItem('pref-theme', 'dark');
            } else {
                localStorage.setItem('pref-theme', 'light');
            }
            updateThemeIcons();
        });
    }

    updateThemeIcons();

    // Mobile Menu Toggle Logic
    const mobileBtn = document.getElementById('mobile-menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    if (mobileBtn && mobileMenu) {
        mobileBtn.addEventListener('click', () => {
            const isHidden = mobileMenu.classList.toggle('hidden');
            // If we are not hidden, ensure display is flex (Tailwind compatibility)
            mobileMenu.style.display = isHidden ? 'none' : 'flex';
            
            const icon = mobileBtn.querySelector('span');
            if (icon) {
                icon.textContent = isHidden ? 'menu' : 'close';
            }
        });

        // Close menu when clicking a link (important for soft navigation)
        const mobileLinks = mobileMenu.querySelectorAll('a');
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                mobileMenu.style.display = 'none';
                const icon = mobileBtn.querySelector('span');
                if (icon) icon.textContent = 'menu';
            });
        });
    }
</script>
