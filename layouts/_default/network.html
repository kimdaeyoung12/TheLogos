{{ define "main" }}
<section class="graph-section">
    <div id="knowledge-graph-container" class="knowledge-graph-container">
        <div class="network-graph-status">Loading knowledge graph...</div>
    </div>

    <header class="network-heading">
        <p>The Logos Map</p>
        <h1>{{ .Title }}</h1>
        <span>{{ .Description }}</span>
    </header>

    <div class="network-search-container">
        <label class="network-search-label" for="network-search">Search network</label>
        <input type="search" id="network-search" class="network-search-input" placeholder="Search nodes, tags, ideas..."
            autocomplete="off">
        <button id="network-search-clear" class="network-search-clear" style="display:none;" aria-label="Clear search">
            &times;
        </button>
    </div>

    <button id="reset-view" class="reset-view-btn" type="button">Reset view</button>

    <div id="node-panel" class="node-panel" aria-live="polite">
        <button id="panel-close" class="panel-close" type="button" aria-label="Close panel">&times;</button>
        <div class="panel-content">
            <span id="panel-type" class="panel-type"></span>
            <h2 id="panel-title" class="panel-title"></h2>
            <p id="panel-date" class="panel-date"></p>
            <p id="panel-summary" class="panel-summary"></p>
            <a id="panel-link" class="panel-link" href="#">
                <span id="panel-link-text">Open article</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    aria-hidden="true">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </a>
        </div>
    </div>
</section>

<style>
    .graph-section {
        --network-bg: #07111f;
        --network-ink: #f4f0e8;
        --network-muted: #b4bbc8;
        --network-line: rgba(244, 240, 232, 0.14);
        --network-surface: rgba(13, 15, 18, 0.82);
        --network-accent: #5dd4c2;
        background: var(--network-bg);
        height: calc(100vh - 64px);
        min-height: 620px;
        overflow: hidden;
        position: relative;
        width: 100%;
    }

    .knowledge-graph-container {
        height: 100%;
        width: 100%;
    }

    .network-heading {
        left: 50%;
        max-width: min(760px, calc(100% - 32px));
        pointer-events: none;
        position: absolute;
        text-align: center;
        top: 28px;
        transform: translateX(-50%);
        z-index: 10;
    }

    .network-heading p {
        color: var(--network-accent);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0;
        margin: 0 0 8px;
        text-transform: uppercase;
    }

    .network-heading h1 {
        color: var(--network-ink);
        font-family: "Noto Serif", Georgia, serif;
        font-size: 2.35rem;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.05;
        margin: 0;
    }

    .network-heading span {
        color: var(--network-muted);
        display: block;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-top: 8px;
    }

    .network-graph-status {
        color: var(--network-muted);
        font-family: var(--font-family-base, sans-serif);
        font-size: 0.95rem;
        left: 50%;
        pointer-events: none;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
    }

    .network-search-container {
        align-items: center;
        background: var(--network-surface);
        border: 1px solid var(--network-line);
        border-radius: 8px;
        bottom: 28px;
        display: flex;
        gap: 8px;
        left: 50%;
        padding: 10px 12px;
        position: absolute;
        transform: translateX(-50%);
        width: min(440px, calc(100% - 32px));
        z-index: 20;
    }

    .network-search-label {
        border: 0;
        clip: rect(0, 0, 0, 0);
        height: 1px;
        margin: -1px;
        overflow: hidden;
        padding: 0;
        position: absolute;
        white-space: nowrap;
        width: 1px;
    }

    .network-search-input {
        background: transparent;
        border: 0;
        color: var(--network-ink);
        flex: 1;
        font: inherit;
        min-width: 0;
        outline: 0;
    }

    .network-search-input::placeholder {
        color: rgba(180, 187, 200, 0.72);
    }

    .network-search-clear {
        background: transparent;
        border: 0;
        color: var(--network-muted);
        cursor: pointer;
        font-size: 1.3rem;
        height: 28px;
        line-height: 1;
        padding: 0;
        width: 28px;
    }

    .reset-view-btn {
        background: var(--network-surface);
        border: 1px solid var(--network-line);
        border-radius: 8px;
        bottom: 28px;
        color: var(--network-ink);
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 800;
        left: 24px;
        min-height: 42px;
        padding: 10px 16px;
        position: absolute;
        z-index: 50;
    }

    .reset-view-btn:hover,
    .network-search-container:focus-within {
        border-color: var(--network-accent);
    }

    .node-panel {
        background: rgba(13, 15, 18, 0.92);
        border: 1px solid var(--network-line);
        border-radius: 8px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
        max-height: 78vh;
        opacity: 0;
        overflow-y: auto;
        padding: 22px;
        position: absolute;
        right: 24px;
        top: 50%;
        transform: translateY(-50%) scale(0.96);
        transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
        visibility: hidden;
        width: min(340px, calc(100% - 48px));
        z-index: 100;
    }

    .node-panel.open {
        opacity: 1;
        transform: translateY(-50%) scale(1);
        visibility: visible;
    }

    .panel-close {
        background: transparent;
        border: 0;
        color: var(--network-muted);
        cursor: pointer;
        font-size: 1.8rem;
        line-height: 1;
        padding: 0;
        position: absolute;
        right: 16px;
        top: 14px;
    }

    .panel-content {
        margin-top: 34px;
    }

    .panel-type {
        border: 1px solid var(--network-line);
        border-radius: 999px;
        color: var(--network-accent);
        display: inline-flex;
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0;
        margin-bottom: 12px;
        padding: 5px 9px;
        text-transform: uppercase;
    }

    .panel-title {
        color: var(--network-ink);
        font-family: var(--font-family-base, sans-serif);
        font-size: 1.35rem;
        font-weight: 850;
        line-height: 1.35;
        margin: 0 0 14px;
    }

    .panel-date {
        color: var(--network-muted);
        font-size: 0.85rem;
        margin: 0 0 12px;
    }

    .panel-summary {
        color: var(--network-muted);
        display: -webkit-box;
        font-size: 0.95rem;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        line-height: 1.65;
        margin: 0 0 22px;
        overflow: hidden;
    }

    .panel-link {
        align-items: center;
        background: var(--network-ink);
        border-radius: 8px;
        color: var(--network-bg);
        display: inline-flex;
        font-weight: 900;
        gap: 8px;
        min-height: 42px;
        padding: 10px 14px;
        text-decoration: none;
    }

    @media (max-width: 768px) {
        .graph-section {
            min-height: 700px;
        }

        .network-heading h1 {
            font-size: 1.9rem;
        }

        .network-search-container {
            bottom: 82px;
        }

        .reset-view-btn {
            bottom: 24px;
            left: 16px;
            right: 16px;
            width: calc(100% - 32px);
        }

        .node-panel {
            max-height: 48vh;
            right: 16px;
            top: auto;
            bottom: 24px;
            transform: translateY(12px);
            width: calc(100% - 32px);
        }

        .node-panel.open {
            transform: translateY(0);
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .node-panel {
            transition: none;
        }
    }
</style>

{{ $data := partial "graph-data.html" . }}
<script>
    window.graphData = {{ $data | jsonify | safeJS }};
</script>

{{- $graph_js := resources.Get "js/knowledge-graph.js" | fingerprint -}}
<script src="{{ $graph_js.RelPermalink }}" integrity="{{ $graph_js.Data.Integrity }}"></script>
{{ end }}
