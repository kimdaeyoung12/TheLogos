<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 230" role="img" aria-labelledby="title desc">
  <title id="title">CRISPR editing pipeline</title>
  <desc id="desc">Target, Guide, Editor, Repair, Outcome stages in a CRISPR editing pipeline.</desc>
  <defs>
    <marker id="arrow-crispr-img" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <filter id="card-shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="980" height="230" rx="18" fill="#f8fafc"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#111827">
    <g filter="url(#card-shadow)">
      <rect x="24" y="58" width="142" height="78" rx="10" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
      <text x="95" y="89" text-anchor="middle" font-size="18" font-weight="700">Target</text>
      <text x="95" y="113" text-anchor="middle" font-size="14">locus + PAM</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="214" y="58" width="142" height="78" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="285" y="89" text-anchor="middle" font-size="18" font-weight="700">Guide</text>
      <text x="285" y="113" text-anchor="middle" font-size="14">sgRNA / pegRNA</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="404" y="58" width="152" height="78" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="480" y="89" text-anchor="middle" font-size="18" font-weight="700">Editor</text>
      <text x="480" y="113" text-anchor="middle" font-size="14">Cas / BE / PE</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="604" y="58" width="152" height="78" rx="10" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
      <text x="680" y="89" text-anchor="middle" font-size="18" font-weight="700">Repair</text>
      <text x="680" y="113" text-anchor="middle" font-size="14">NHEJ / HDR</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="806" y="58" width="150" height="78" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
      <text x="881" y="89" text-anchor="middle" font-size="18" font-weight="700">Outcome</text>
      <text x="881" y="113" text-anchor="middle" font-size="14">allele distribution</text>
    </g>
    <line x1="166" y1="97" x2="209" y2="97" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-crispr-img)"/>
    <line x1="356" y1="97" x2="399" y2="97" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-crispr-img)"/>
    <line x1="556" y1="97" x2="599" y2="97" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-crispr-img)"/>
    <line x1="756" y1="97" x2="801" y2="97" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-crispr-img)"/>
    <text x="490" y="176" text-anchor="middle" font-size="16" fill="#475569">Final phenotype depends on delivery, chromatin state, repair dynamics, and error profile.</text>
    <text x="490" y="202" text-anchor="middle" font-size="13" fill="#64748b">A control-pipeline view of CRISPR-Cas editing</text>
  </g>
</svg>
