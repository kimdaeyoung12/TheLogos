<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랜덤워크(Random Walk): 우연한 한 걸음이 만드는 장기 패턴 · 인터랙티브 인포그래픽</title>
  <meta name="description" content="랜덤워크는 매 순간 무작위로 한 걸음씩 이동하는 확률 과정이다. 개별 움직임은 단순하지만 시간이 지나면 확산, 도박사의 파산, 금융 가격 모델 같은 중요한 현상을 설명한다." />
  <style>

:root{
  --bg:#07111f; --panel:#0f1d33; --panel2:#13243e; --text:#edf5ff; --muted:#b5c5d8;
  --line:#2b4261; --accent:#5dd6ff; --accent2:#9cffc8; --accent3:#ffd166; --danger:#ff7b8a;
  --purple:#c7a7ff; --shadow:0 22px 70px rgba(0,0,0,.30); --radius:22px;
}
*{box-sizing:border-box} html{scroll-behavior:smooth}
body{
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Roboto,Arial,sans-serif;
  background:radial-gradient(circle at top left, rgba(93,214,255,.22), transparent 34rem),
             radial-gradient(circle at 80% 4%, rgba(199,167,255,.16), transparent 34rem),
             radial-gradient(circle at 72% 34%, rgba(156,255,200,.12), transparent 28rem),
             linear-gradient(180deg,#07111f 0%,#0a1424 50%,#08101e 100%);
  color:var(--text); line-height:1.72;
}
a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
.wrap{width:min(1120px,calc(100% - 36px));margin:0 auto}
.topbar{position:sticky;top:0;z-index:9;backdrop-filter:blur(12px);background:rgba(7,17,31,.78);border-bottom:1px solid rgba(255,255,255,.08)}
.topbar .wrap{display:flex;gap:10px;overflow:auto;padding:10px 0;align-items:center}.topbar a,.topbar span{white-space:nowrap;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.055);color:var(--muted);font-weight:750;font-size:14px}.topbar span{color:var(--accent);background:rgba(93,214,255,.08)}
.hero{padding:70px 0 34px;position:relative;overflow:hidden}.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid rgba(93,214,255,.35);border-radius:999px;color:var(--accent);background:rgba(93,214,255,.08);font-weight:850;font-size:14px}.badge span{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 16px var(--accent2)}
h1{font-size:clamp(38px,6.4vw,78px);line-height:1.02;margin:20px 0 18px;letter-spacing:-.055em}h2{font-size:clamp(27px,3.3vw,42px);margin:0 0 16px;letter-spacing:-.035em}h3{font-size:22px;margin:0 0 10px;letter-spacing:-.02em}h4{font-size:18px;margin:18px 0 8px;color:#eaf6ff}p{margin:0 0 13px}.lead{font-size:clamp(18px,2.1vw,23px);color:var(--muted);max-width:960px}.section{padding:34px 0}.card{background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;backdrop-filter:blur(10px)}
.grid2{display:grid;grid-template-columns:0.92fr 1.08fr;gap:22px}.mini{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px}.mini strong{display:block;margin:0 0 6px;color:#f5fbff}.mini small{color:var(--muted)}.smallcaps{text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:var(--accent);font-weight:900}.formula{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;background:#050b14;border:1px solid rgba(93,214,255,.25);color:#d9f7ff;padding:16px;border-radius:16px;font-size:clamp(14px,1.6vw,18px);overflow:auto;white-space:pre-wrap}.note{color:var(--muted);font-size:14px;margin-top:10px}.pill-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.pill{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.055);color:var(--muted)}.pill b{color:var(--text)}
canvas{width:100%;height:auto;border-radius:18px;background:rgba(5,11,20,.92);border:1px solid rgba(255,255,255,.10)}button{border:0;color:#06111f;background:var(--accent2);border-radius:12px;padding:10px 14px;font-weight:850;cursor:pointer;box-shadow:0 10px 24px rgba(156,255,200,.13);transition:.15s transform ease,.15s opacity ease}button:hover{transform:translateY(-1px)}button.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.14);box-shadow:none}input[type=range]{width:100%}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}.control{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px}.control label{display:flex;justify-content:space-between;gap:12px;color:#dfeeff;font-weight:800;font-size:14px;margin-bottom:8px}.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.metric{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px}.metric strong{font-size:25px;display:block;color:var(--accent2);line-height:1.1}.metric span{font-size:13px;color:var(--muted)}
.gridworld{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.cell{min-height:86px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;justify-content:center;align-items:center;font-weight:900;position:relative;overflow:hidden}.cell small{font-weight:700;color:var(--muted)}.cell.goal{background:rgba(156,255,200,.12);border-color:rgba(156,255,200,.25)}.cell.pit{background:rgba(255,123,138,.13);border-color:rgba(255,123,138,.25)}.cell.wall{background:rgba(255,255,255,.025);color:#52647a}.arrowPolicy{font-size:27px;color:var(--accent3)}.dsr-result{font-size:42px;font-weight:950;letter-spacing:-.04em;line-height:1.1;margin:12px 0 4px;color:var(--accent2)}
.article{max-width:900px;margin:0 auto}.article h2{margin-top:42px}.article h3{margin-top:30px}.article p,.article li{color:#d7e5f5}.article blockquote{margin:18px 0;padding:18px 20px;border-left:5px solid var(--accent3);background:rgba(255,209,102,.08);border-radius:14px;color:#fff4d7}.article blockquote p{color:#fff4d7}.article pre{background:#050b14;border:1px solid rgba(93,214,255,.25);border-radius:16px;padding:16px;overflow:auto;color:#d9f7ff}.article code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace}.article :not(pre)>code{background:rgba(93,214,255,.12);border:1px solid rgba(93,214,255,.18);padding:.1em .35em;border-radius:6px}.article ul{padding-left:22px}.article li{margin:8px 0}.article hr{border:0;border-top:1px solid rgba(255,255,255,.12);margin:32px 0}.article a{word-break:break-all}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.tag{font-size:13px;color:var(--muted);padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.10)}.foot{padding:38px 0 58px;color:var(--muted);font-size:14px;text-align:center}
@media (max-width:920px){.grid2,.controls,.metric-grid{grid-template-columns:1fr}.hero{padding-top:46px}.card{padding:20px}.cell{min-height:70px}}

html{background:#07111f}body{padding:0;overflow-x:hidden}.section{padding:24px 0 28px}.wrap{width:min(1120px,calc(100% - 24px))}.card{box-shadow:none}.metric-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}.metric strong{font-size:22px}.control input{accent-color:#5dd6ff}@media(max-width:920px){.grid2{gap:16px}.controls{gap:10px}.metric-grid{gap:10px}canvas{min-height:240px;object-fit:cover}}
  </style>
</head>
<body>
<section id="interactive" class="section">
  <div class="wrap grid2">
    <div class="card">
      <div class="smallcaps">Interactive infographic</div>
      <h2>우연한 한 걸음의 누적</h2>
      <p><b>핵심:</b> 랜덤워크는 매 순간 무작위로 한 걸음씩 이동하는 과정이다. 평균은 제자리에 있어도 가능한 위치의 폭은 시간이 갈수록 넓어진다.</p>
      <div class="formula">X₀ = 0
Xₙ = Xₙ₋₁ + εₙ
εₙ ∈ {−1, +1}</div>
      <p class="note">공정한 랜덤워크의 전형적 폭은 대략 √n 규모로 커진다.</p>
      <div class="pill-row"><span class="pill"><b>한 경로</b> 우연한 역사</span><span class="pill"><b>여러 경로</b> 가능한 미래</span><span class="pill"><b>편향 p</b> 장기 드리프트</span></div>
    </div>
    <div class="card">
      <h3>가능한 경로의 폭을 확인해보기</h3>
      <canvas id="rwCanvas" width="900" height="310"></canvas>
      <div class="controls">
        <div class="control"><label>스텝 수 <span id="rwStepsVal">120</span></label><input id="rwSteps" type="range" min="20" max="300" value="120" step="10"/></div>
        <div class="control"><label>오른쪽 확률 p <span id="rwBiasVal">0.50</span></label><input id="rwBias" type="range" min="20" max="80" value="50"/></div>
        <div class="control"><label>시드 <span id="rwSeedVal">5</span></label><input id="rwSeed" type="range" min="1" max="99" value="5"/></div>
      </div>
      <div class="metric-grid">
        <div class="metric"><strong id="rwMean">-</strong><span>마지막 위치 평균</span></div>
        <div class="metric"><strong id="rwSd">-</strong><span>마지막 위치 표준편차</span></div>
        <div class="metric"><strong id="rwSqrt">-</strong><span>√n 기준 폭</span></div>
        <div class="metric"><strong id="rwDrift">-</strong><span>p가 만드는 이론 평균</span></div>
      </div>
    </div>
  </div>
</section>
<script>
function reportHeight(){try{const height=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight);window.parent.postMessage({type:'thelogos-interactive-height',height},window.location.origin)}catch(error){}}
window.addEventListener('load',reportHeight);window.addEventListener('resize',reportHeight);window.addEventListener('message',function(event){if(event.origin!==window.location.origin||event.data?.type!=='thelogos-interactive-theme')return;document.documentElement.dataset.theme=event.data.theme});if('ResizeObserver' in window){new ResizeObserver(reportHeight).observe(document.body)}setTimeout(reportHeight,60);

function rng(seed){let s=seed>>>0;return function(){s=(1664525*s+1013904223)>>>0;return s/4294967296}}
function normal(rand){let u=0,v=0;while(u===0)u=rand();while(v===0)v=rand();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function fmt(x,d=2){return Number(x).toFixed(d)}
function clearCanvas(ctx,w,h){ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(5,11,20,.92)';ctx.fillRect(0,0,w,h)}
function drawAxes(ctx,w,h){ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(48,h-42);ctx.lineTo(w-18,h-42);ctx.moveTo(48,16);ctx.lineTo(48,h-42);ctx.stroke()}
function drawLine(ctx,pts,color,width=2,alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();pts.forEach((p,i)=>{if(i===0)ctx.moveTo(p[0],p[1]);else ctx.lineTo(p[0],p[1])});ctx.stroke();ctx.restore()}

function renderRW(){
  const canvas=document.getElementById('rwCanvas'),ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;clearCanvas(ctx,w,h);drawAxes(ctx,w,h);const steps=+document.getElementById('rwSteps').value,p=+document.getElementById('rwBias').value/100,seed=+document.getElementById('rwSeed').value;document.getElementById('rwStepsVal').textContent=steps;document.getElementById('rwBiasVal').textContent=fmt(p,2);document.getElementById('rwSeedVal').textContent=seed;
  const rand=rng(seed);const paths=24;const drift=2*p-1;const finalSd=Math.sqrt(Math.max(0.001,4*p*(1-p)*steps));const maxY=Math.max(18,Math.ceil(Math.abs(drift*steps)+finalSd*3.2));const sx=i=>48+i*(w-75)/steps;const sy=v=>h/2-v*(h-82)/(maxY*2);ctx.strokeStyle='rgba(255,255,255,.11)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(48,h/2);ctx.lineTo(w-18,h/2);ctx.stroke();const upper=[],lower=[],meanLine=[];for(let i=0;i<=steps;i++){const mu=i*drift;const sd=Math.sqrt(Math.max(0,4*p*(1-p)*i));upper.push([sx(i),sy(mu+2*sd)]);lower.push([sx(i),sy(mu-2*sd)]);meanLine.push([sx(i),sy(mu)])}ctx.fillStyle='rgba(93,214,255,.13)';ctx.beginPath();upper.concat(lower.reverse()).forEach((pt,i)=>{if(i===0)ctx.moveTo(pt[0],pt[1]);else ctx.lineTo(pt[0],pt[1])});ctx.closePath();ctx.fill();drawLine(ctx,meanLine,'#ffd166',2.4,.95);
  let finals=[];for(let j=0;j<paths;j++){let y=0,pts=[[sx(0),sy(0)]];for(let i=1;i<=steps;i++){y+=(rand()<p?1:-1);pts.push([sx(i),sy(y)])}finals.push(y);const colors=['#5dd6ff','#9cffc8','#ffd166','#c7a7ff','#ff7b8a'];drawLine(ctx,pts,colors[j%colors.length],1.7,j===0?1:.32)}ctx.fillStyle='#b5c5d8';ctx.font='14px system-ui';ctx.fillText('파란 음영은 이론적 ±2σ 폭, 노란 선은 편향 p가 만드는 평균 드리프트다',60,26);const mean=finals.reduce((a,b)=>a+b,0)/finals.length;const sd=Math.sqrt(finals.reduce((a,b)=>a+(b-mean)*(b-mean),0)/finals.length);document.getElementById('rwMean').textContent=fmt(mean,1);document.getElementById('rwSd').textContent=fmt(sd,1);document.getElementById('rwSqrt').textContent='±'+fmt(Math.sqrt(steps),1);document.getElementById('rwDrift').textContent=fmt(drift*steps,1);if(typeof reportHeight==='function')reportHeight()
}
function attach(){['rwSteps','rwBias','rwSeed'].forEach(id=>document.getElementById(id).addEventListener('input',renderRW));renderRW()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',attach);else attach();

</script>
</body>
</html>
